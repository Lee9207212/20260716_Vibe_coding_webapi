services:
  - type: web
    name: fastapi-hello-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: books-postgres
          property: connectionString

databases:
  - name: books-postgres
    databaseName: books_db
    user: books_user
